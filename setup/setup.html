<!DOCTYPE html>
<html>
<head>
  <title>Emplai HRMS Biometric Setup</title>
  <style>
    body { font-family: Arial; padding: 40px; max-width: 560px; margin: auto; }
    input { width: 100%; padding: 8px; margin: 6px 0; box-sizing: border-box; }
    button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
    .hidden { display: none; }
    .banner { padding: 12px; background: #e6ffed; border: 1px solid #34a853; margin-bottom: 16px; }
  </style>
</head>
<body>

  <div id="configuredBanner" class="banner hidden">
    ✅ Agent is already configured. Showing current settings (read-only).
  </div>

  <h2 id="title">Biometric Agent Setup</h2>

  <form id="setupForm">
    <label>Agent Key</label>
    <input type="text" name="agentKey" required />

    <label>DB Host</label>
    <input type="text" name="dbHost" required />

    <label>DB Username</label>
    <input type="text" name="dbUser" required />

    <label>DB Password</label>
    <input type="password" name="dbPassword" required />

    <label>DB Name</label>
    <input type="text" name="dbName" required />

    <label>Cloud URL</label>
    <input type="text" name="cloudUrl" required />

    <button type="submit" id="submitBtn">Save Configuration</button>
  </form>

<script>
  async function init() {
    // 1. Check whether agent is already configured
    const statusRes = await fetch("/status");
    const status = await statusRes.json();

    if (status.configured) {
      // Already set up → fetch remote config and prefill (read-only)
      document.getElementById("configuredBanner").classList.remove("hidden");
      document.getElementById("title").textContent = "Biometric Agent (Configured)";

      const cfgRes = await fetch("/config");
      const cfg = await cfgRes.json();
      const data = cfg?.data || {};

      for (const key in data) {
        const field = document.querySelector(`[name="${key}"]`);
        if (field) field.value = data[key] ?? "";
      }

      // Lock the form so the user can't re-submit
      document.querySelectorAll("#setupForm input").forEach(i => i.disabled = true);
      document.getElementById("submitBtn").disabled = true;
      document.getElementById("submitBtn").textContent = "Already Configured";
      return;
    }

    // 2. Not configured → wire up the submit handler
    document.getElementById("setupForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());

      const response = await fetch("/save-config", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });
      const result = await response.json();

      if (result.success) {
        alert(result.message || "Configuration saved! Restart agent.");
      } else {
        alert("Failed to save configuration: " + (result.message || "Unknown error"));
      }
    });
  }

  init();
</script>

</body>
</html>
